openapi: 3.0.0
info:
  title: store
  version: '1.0'
  description: A simple store
  contact:
    name: SecuritEase Dev
    url: 'https://www.securitease.com'
    email: internal@securitease.com
  termsOfService: 'https://www.securitease.com'
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.htm'
servers:
  - url: 'http://localhost:8080'
    description: dev
security:
  - ApiKeyAuth: []
paths:
  /v1/order:
    get:
      summary: Get Orders
      tags:
        - store
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  page:
                    $ref: '#/components/schemas/PageMetadata'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: getOrders
      description: Get orders, paginated
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
    post:
      summary: Create Order
      tags:
        - store
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Bad Request - customer or product ID not found
        '409':
          description: Conflict - a request with this Idempotency-Key is already in progress
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: createOrder
      description: Create a new order
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                customerId:
                  type: integer
                  format: int64
                productIds:
                  type: array
                  items:
                    type: integer
                    format: int64
  /v1/order/{id}:
    get:
      summary: Get Order by ID
      tags:
        - store
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Not Found
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: getOrderById
      description: Get a specific order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
  /v1/customer:
    get:
      summary: Get Customers
      tags:
        - store
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  page:
                    $ref: '#/components/schemas/PageMetadata'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: getCustomers
      description: Get customers, paginated, optionally filtered by a substring match against one of the words in their name
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
          description: Substring to match against a word in the customer's name
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
    post:
      summary: Create Customer
      tags:
        - store
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '409':
          description: Conflict - a request with this Idempotency-Key is already in progress
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: createCustomer
      description: Create a new customer
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
  /v1/products:
    get:
      summary: Get Products
      tags:
        - store
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  page:
                    $ref: '#/components/schemas/PageMetadata'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: getProducts
      description: Get products, paginated
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
    post:
      summary: Create Product
      tags:
        - store
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '409':
          description: Conflict - a request with this Idempotency-Key is already in progress
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: createProduct
      description: Create a new product
      parameters:
        - $ref: '#/components/parameters/idempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
  /v1/products/{id}:
    get:
      summary: Get Product by ID
      tags:
        - store
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not Found
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      operationId: getProductById
      description: Get a specific product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
components:
  responses:
    ServiceUnavailable:
      description: >-
        Service Unavailable - the database is unreachable (circuit open) or a query
        failed after retries were exhausted
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Required on every endpoint except /actuator/health/**
  parameters:
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
      description: Zero-based page index
    size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
      description: Page size (capped at 100)
    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: 'Sort order, e.g. "id,desc"'
    idempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: >-
        Optional. A retry with the same key on this path replays the original response
        instead of repeating the write. Omit for normal (non-idempotent) behavior.
  schemas:
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
        number:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    Order:
      title: Order
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        customer:
          type: object
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
        products:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              description:
                type: string
    Product:
      title: Product
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        orders:
          type: array
          items:
            type: integer
            format: int64
    Customer:
      title: Customer
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        orders:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              description:
                type: string
                x-stoplight:
                  id: mq08x82g95zl9
tags:
  - name: store
    description: store operations

spring:
  datasource:
    # Local-dev-only defaults (match the docker run command in CLAUDE.md/README). Override
    # via the standard SPRING_DATASOURCE_* env vars in any other environment.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/store}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    hikari:
      # Fail fast rather than hanging when the pool is exhausted or the DB is unreachable.
      connection-timeout: 5000
      validation-timeout: 3000
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 10
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          # every endpoint requires the DB, so a probe should pull this instance
          # out of rotation when it can't reach it, not just when the JVM is stuck
          include: readinessState,db
  info:
    env:
      enabled: true

app:
  security:
    # Local-dev-only default. Override via the API_KEY env var in any other environment.
    api-key: ${API_KEY:local-dev-only-change-me}

logging:
  pattern:
    # Include the correlation id (RequestIdFilter) in the plain-text local dev console too -
    # structured formats (see below) pick up MDC content automatically, no pattern needed.
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n'
  structured:
    format:
      # Unset by default so local `bootRun` stays human-readable. Set to ecs/logstash/gelf
      # (e.g. via LOGGING_STRUCTURED_FORMAT_CONSOLE) for any environment where logs are
      # consumed by an aggregator rather than a human terminal - see the Dockerfile.
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:}

resilience4j:
  circuitbreaker:
    instances:
      database:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # A 404/400 from a service method is a business outcome, not a DB failure -
        # it shouldn't count toward tripping the circuit.
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException
  retry:
    instances:
      # Only applied to read methods (see CustomerService/OrderService/ProductService) -
      # retrying a write automatically is unsafe if the connection drops after the write
      # reaches Postgres but before the ack comes back, since a blind retry could insert
      # a second row. Reads have no such risk.
      database:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # Both hierarchies show up in practice: a failed query is a DataAccessException,
        # but failing to even open the transaction (e.g. no connection available) is a
        # TransactionException - a sibling hierarchy, not a DataAccessException subtype.
        retry-exceptions:
          - org.springframework.dao.DataAccessException
          - org.springframework.transaction.TransactionException
        ignore-exceptions:
          - org.springframework.web.server.ResponseStatusException